<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options P&L Visualizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0e1a;
  color: #e0e6ed;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 900px;
  margin: 0 auto;
}
h1 {
  font-size: 1.5rem;
  color: #fbbf24;
  text-align: center;
  margin-bottom: 24px;
}
.controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #1f2937;
}
.control-group label {
  display: block;
  font-size: 0.75rem;
  color: #9ca3af;
  margin-bottom: 4px;
}
.control-group input, .control-group select {
  width: 100%;
  padding: 10px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 6px;
  color: #e0e6ed;
  font-size: 0.9rem;
}
button {
  grid-column: 1 / -1;
  padding: 12px;
  background: #fbbf24;
  color: #0a0e1a;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
button:hover { opacity: 0.9; }
.chart-container {
  background: #111827;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid #1f2937;
  margin-bottom: 20px;
}
canvas { width: 100%; height: 350px; }
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}
.stat-card {
  background: #111827;
  border-radius: 10px;
  padding: 16px;
  border: 1px solid #1f2937;
  text-align: center;
}
.stat-label {
  font-size: 0.75rem;
  color: #9ca3af;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 1.25rem;
  font-weight: 700;
}
.stat-value.green { color: #22c55e; }
.stat-value.red { color: #ef4444; }
.stat-value.yellow { color: #fbbf24; }
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 0.75rem;
  color: #6b7280;
}
</style>
</head>
<body>
<div class="container">
  <h1>Options P&L Visualizer</h1>
  
  <div class="controls">
    <div class="control-group">
      <label>Option Type</label>
      <select id="type">
        <option value="call">Call</option>
        <option value="put">Put</option>
      </select>
    </div>
    <div class="control-group">
      <label>Strategy</label>
      <select id="strategy">
        <option value="long">Long</option>
        <option value="short">Short</option>
      </select>
    </div>
    <div class="control-group">
      <label>Strike Price ($)</label>
      <input type="number" id="strike" value="100">
    </div>
    <div class="control-group">
      <label>Premium ($)</label>
      <input type="number" id="premium" value="5" step="0.01">
    </div>
    <div class="control-group">
      <label>Contracts</label>
      <input type="number" id="contracts" value="1">
    </div>
    <div class="control-group">
      <label>Price Range ($)</label>
      <input type="number" id="range" value="30">
    </div>
    <button onclick="draw()">Update Chart</button>
  </div>
  
  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
  
  <div class="stats" id="stats"></div>
  
  <div class="footer">Built for options traders. Visualize risk before you trade.</div>
</div>

<script>
function draw() {
  const type = document.getElementById('type').value;
  const strategy = document.getElementById('strategy').value;
  const strike = parseFloat(document.getElementById('strike').value);
  const premium = parseFloat(document.getElementById('premium').value);
  const contracts = parseInt(document.getElementById('contracts').value);
  const range = parseFloat(document.getElementById('range').value);
  
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  
  const w = rect.width, h = rect.height;
  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  
  const minPrice = strike - range;
  const maxPrice = strike + range;
  const mult = contracts * 100;
  
  const pnlAt = (price) => {
    let intrinsic = 0;
    if (type === 'call') intrinsic = Math.max(0, price - strike);
    else intrinsic = Math.max(0, strike - price);
    
    if (strategy === 'long') return (intrinsic - premium) * mult;
    else return (premium - intrinsic) * mult;
  };
  
  let maxPnL = -Infinity, minPnL = Infinity;
  for (let p = minPrice; p <= maxPrice; p += 0.5) {
    const v = pnlAt(p);
    maxPnL = Math.max(maxPnL, v);
    minPnL = Math.min(minPnL, v);
  }
  
  const padding = (maxPnL - minPnL) * 0.1;
  maxPnL += padding;
  minPnL -= padding;
  if (maxPnL === minPnL) { maxPnL += 10; minPnL -= 10; }
  
  const xScale = (p) => pad.left + ((p - minPrice) / (maxPrice - minPrice)) * cw;
  const yScale = (v) => pad.top + ch - ((v - minPnL) / (maxPnL - minPnL)) * ch;
  
  ctx.clearRect(0, 0, w, h);
  
  // Grid
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + (ch / 5) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    const val = maxPnL - (maxPnL - minPnL) * (i / 5);
    ctx.fillStyle = '#6b7280'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'right'; ctx.fillText('$' + (val/1000).toFixed(1) + 'k', pad.left - 8, y + 4);
  }
  for (let i = 0; i <= 6; i++) {
    const x = pad.left + (cw / 6) * i;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke();
    const price = minPrice + (maxPrice - minPrice) * (i / 6);
    ctx.fillStyle = '#6b7280'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('$' + price.toFixed(0), x, pad.top + ch + 18);
  }
  
  // Zero line
  const y0 = yScale(0);
  ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, y0); ctx.lineTo(pad.left + cw, y0); ctx.stroke();
  ctx.setLineDash([]);
  
  // Build fill path
  ctx.beginPath();
  for (let p = minPrice; p <= maxPrice; p += 0.5) {
    const x = xScale(p), y = yScale(pnlAt(p));
    if (p === minPrice) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(xScale(maxPrice), y0);
  ctx.lineTo(xScale(minPrice), y0);
  ctx.closePath();
  
  // Fill area under curve
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = strategy === 'long' ? '#22c55e' : '#ef4444';
  ctx.fill();
  ctx.globalAlpha = 1;
  
  // Stroke P&L line on top
  ctx.beginPath();
  for (let p = minPrice; p <= maxPrice; p += 0.5) {
    const x = xScale(p), y = yScale(pnlAt(p));
    if (p === minPrice) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = strategy === 'long' ? '#22c55e' : '#ef4444';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  
  // Breakeven line
  const be = type === 'call' ? (strategy === 'long' ? strike + premium : strike + premium) : (strategy === 'long' ? strike - premium : strike - premium);
  if (be >= minPrice && be <= maxPrice) {
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
    const x = xScale(be);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke();
    ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('BE $' + be, x, pad.top - 6);
  }
  
  // Strike line
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1.5;
  const xs = xScale(strike);
  ctx.beginPath(); ctx.moveTo(xs, pad.top); ctx.lineTo(xs, pad.top + ch); ctx.stroke();
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('Strike', xs, pad.top + ch + 32);
  
  // Stats
  const maxProfit = strategy === 'long' ? (type === 'call' ? Infinity : (strike - minPrice - premium) * mult) : premium * mult;
  const maxLoss = strategy === 'long' ? -premium * mult : (type === 'call' ? Infinity : -(strike - minPrice - premium) * mult);
  
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Max Profit</div><div class="stat-value ${maxProfit > 0 ? 'green' : 'yellow'}">${maxProfit === Infinity ? 'Unlimited' : '$' + maxProfit.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Max Loss</div><div class="stat-value red">${!isFinite(maxLoss) ? 'Unlimited' : '$' + Math.abs(maxLoss).toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Breakeven</div><div class="stat-value yellow">$${be.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Premium Paid</div><div class="stat-value">$${(premium * mult).toLocaleString()}</div></div>
  `;
}

window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
